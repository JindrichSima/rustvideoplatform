services:
 rustapp:
   image: panmourovaty/rustvideoplatform
   ports:
    - "8080:8080"
   volumes:
     - ./source:/source
     - ./upload:/upload
     - ./config.json:/config.json
   restart: always
   depends_on:
     - postgres
     - meilisearch
     - indexer
 source:
   image: nginx:alpine
   ports:
    - "8880:8880"
   volumes:
     - ./source:/source
     - ./nginx.conf:/etc/nginx/nginx.conf:ro
   restart: always
 processor:
   image: panmourovaty/rustvideoplatform-processor
   volumes:
     - ./upload:/upload
     - ./config.json:/config.json
   restart: always
   devices:
     - /dev/dri/renderD128:/dev/dri/renderD128
   depends_on:
     - postgres
     - whisper
     - translatellama
 indexer:
   image: panmourovaty/rustvideoplatform-indexer
   volumes:
     - ./config.json:/config.json
   restart: always
   depends_on:
     - postgres
     - meilisearch
     - dragonfly
 dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    volumes:
      - ./dragonfly:/data
 postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql
    restart: always
    environment:
      - POSTGRES_PASSWORD=SECRET_PASSWORD
      - POSTGRES_USER=vids
      - POSTGRES_DB=vids
 meilisearch:
   image: getmeili/meilisearch:latest
   environment:
     - http_proxy
     - https_proxy
     - MEILI_MASTER_KEY=SECRET_PASSWORD
     - MEILI_NO_ANALYTICS=true
     - MEILI_ENV=production
     - MEILI_LOG_LEVEL
     - MEILI_DB_PATH=/data.ms
 whisper:
   image: ghcr.io/ggml-org/whisper.cpp:main-vulkan
   container_name: whisper
   volumes:
     - ./models:/models
   entrypoint: ["whisper-server"]
   command: ["--host", "0.0.0.0", "--port", "8080", "-sns", "-fa", "-l" , "auto", "--vad","--vad-model", "/models/YOUR_VOICE_DETECTION_MODEL", "-m", "/models/YOUR_WHISPER_MODEL"]
   devices:
     - /dev/dri:/dev/dri
   stdin_open: true
   tty: true
 translatellama:
   image: ghcr.io/ggml-org/llama.cpp:server-vulkan
   container_name: translatellama
   volumes:
     - ./models:/models
   command: ["--host", "0.0.0.0", "--port", "8083", "-m", "/models/YOUR_TRANSLATION_MODEL", "--no-webui"]
   ports:
     - "8083:8083"
   devices:
     - /dev/dri:/dev/dri
   stdin_open: true
   tty: true
