services:
 rustapp:
   image: panmourovaty/rustvideoplatform
   ports:
    - "8080:8080"
   volumes:
     - ./source:/source
     - ./upload:/upload
     - ./config.json:/config.json
   restart: always
   depends_on:
     surrealdb:
       condition: service_healthy
     meilisearch:
       condition: service_started
     indexer:
       condition: service_started
 source:
   image: nginx:alpine
   ports:
    - "8880:8880"
   volumes:
     - ./source:/source
     - ./nginx.conf:/etc/nginx/nginx.conf:ro
   restart: always
 processor:
   image: panmourovaty/rustvideoplatform-processor
   volumes:
     - ./upload:/upload
     - ./source:/source
     - ./config.json:/config.json
   restart: always
   devices:
     - /dev/dri/renderD128:/dev/dri/renderD128
   depends_on:
     surrealdb:
       condition: service_healthy
     whisper:
       condition: service_started
     translatellama:
       condition: service_started
 indexer:
   image: panmourovaty/rustvideoplatform-indexer
   volumes:
     - ./source:/source
     - ./config.json:/config.json
   restart: always
   depends_on:
     surrealdb:
       condition: service_healthy
     meilisearch:
       condition: service_started
     dragonfly:
       condition: service_started
 dragonfly:
   image: docker.dragonflydb.io/dragonflydb/dragonfly
   restart: always
   volumes:
     - ./dragonfly:/data
 surrealdb:
   image: surrealdb/surrealdb:latest
   restart: always
   ports:
     - "8000:8000"
   volumes:
     - ./surrealdb:/mydata
   command:
     - start
     - --log=info
     - --user=root
     - --pass=SECRET_PASSWORD
     - ./db:/mydata/database.db
   healthcheck:
     test: ["CMD", "/surreal", "isready", "--conn", "http://localhost:8000"]
     interval: 5s
     timeout: 5s
     retries: 10
 db-init:
   image: surrealdb/surrealdb:latest
   restart: "no"
   volumes:
     - ../schema.surql:/schema.surql:ro
   command:
     - import
     - --conn=http://surrealdb:8000
     - --user=root
     - --pass=SECRET_PASSWORD
     - --ns=main
     - --db=main
     - /schema.surql
   depends_on:
     surrealdb:
       condition: service_healthy
 meilisearch:
   image: getmeili/meilisearch:latest
   restart: always
   environment:
     - http_proxy
     - https_proxy
     - MEILI_MASTER_KEY=SECRET_PASSWORD
     - MEILI_NO_ANALYTICS=true
     - MEILI_ENV=production
     - MEILI_LOG_LEVEL
     - MEILI_DB_PATH=/data.ms
 whisper:
   image: ghcr.io/ggml-org/whisper.cpp:main-vulkan
   container_name: whisper
   volumes:
     - ./models:/models
   entrypoint: ["whisper-server"]
   command: ["--host", "0.0.0.0", "--port", "8080", "-sns", "-fa", "-l" , "auto", "--vad","--vad-model", "/models/YOUR_VOICE_DETECTION_MODEL", "-m", "/models/YOUR_WHISPER_MODEL"]
   devices:
     - /dev/dri:/dev/dri
   stdin_open: true
   tty: true
 translatellama:
   image: ghcr.io/ggml-org/llama.cpp:server-vulkan
   container_name: translatellama
   volumes:
     - ./models:/models
   command: ["--host", "0.0.0.0", "--port", "8083", "-m", "/models/YOUR_TRANSLATION_MODEL", "--no-webui"]
   ports:
     - "8083:8083"
   devices:
     - /dev/dri:/dev/dri
   stdin_open: true
   tty: true
