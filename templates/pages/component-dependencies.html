<script>
(function(){
    // Theme mode: dark/light
    var saved = null;
    try { saved = localStorage.getItem('theme-mode'); } catch(e){}
    if (saved === 'dark' || saved === 'light') {
        document.documentElement.setAttribute('data-bs-theme', saved);
    } else {
        var d = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-bs-theme', d ? 'dark' : 'light');
    }
    // Custom theme stylesheet
    var theme = null;
    try { theme = localStorage.getItem('user-theme'); } catch(e){}
    if (theme && theme !== 'default') {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.id = 'user-theme-css';
        link.href = '/source/system_style/' + encodeURIComponent(theme) + '.css';
        document.head.appendChild(link);
    }
})();
(function(){try{if(localStorage.getItem('sidebar-collapsed')==='1'){document.documentElement.classList.add('sidebar-will-collapse');}}catch(e){}})();
</script>
<style>
html.sidebar-will-collapse body:has(> .sidebar) { padding-left: 0; }
html.sidebar-will-collapse .sidebar { transform: translateX(-100%); }
html.sidebar-will-collapse .sidebarbackground { transform: translateX(-100%); }
@media screen and (max-width: 1000px) {
    html.sidebar-will-collapse body:has(> .sidebar) { padding-left: 0; }
    html.sidebar-will-collapse .sidebar { transform: translateX(-100%); }
    html.sidebar-will-collapse .sidebarbackground { transform: none; opacity: 0; }
}
</style>
