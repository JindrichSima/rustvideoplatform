{% for item in media %}
<a
    href="/m/{{ item.id }}"
    class="text-decoration-none {% if item.id == current_medium_id %}list-sidebar-active{% endif %}"
    preload="mouseover"
    title="{{ item.name }}"
>
    <table class="my-3">
        <tr>
            <td class="d-flex justify-content-center me-3">
                <div
                    class="thumbnail-container"
                    style="position: relative; width: 176px; height: 99px"
                >
                    <img
                        src="/source/{{ item.id }}/thumbnail.avif"
                        class="rounded {% if item.type == "video" %}thumbnail-static{% endif %}"
                        style="
                            position: absolute;
                            top: 0;
                            left: 0;
                            transition: opacity 0.3s;
                        "
                        width="176"
                        height="99"
                    />
                    <div class="search-card-type-badge">
                        {% if item.type == "video" %}
                        <i class="fa-solid fa-video"></i>
                        {% else if item.type == "audio" %}
                        <i class="fa-solid fa-music"></i>
                        {% else if item.type == "picture" %}
                        <i class="fa-solid fa-image"></i>
                        {% endif %}
                    </div>
                    {% if item.type == "video" %}
                    <img
                        src="/source/{{ item.id }}/showcase.avif"
                        class="rounded thumbnail-animated"
                        style="
                            position: absolute;
                            top: 0;
                            left: 0;
                            opacity: 0;
                            transition: opacity 0.3s;
                        "
                        width="176"
                        height="99"
                    />
                    {% endif %}
                </div>
            </td>
            <td>
                <b class="text-white font-weight-bold medium-name"
                    >{{ item.name }}</b
                >
                <p class="text-secondary m-0">
                    {{ item.owner }}<br />{{ item.views }} views
                </p>
            </td>
        </tr>
    </table>
</a>
{% endfor %}

<style>
    .thumbnail-container:hover .thumbnail-static {
        opacity: 0 !important;
    }
    .thumbnail-container:hover .thumbnail-animated {
        opacity: 1 !important;
    }
</style>
