<div class="dropdown">
    <button class="btn d-flex align-items-center gap-2 p-1">
        {% if user.profile_picture.is_some() %}
        <img src="{{ config.source_server_url }}/source/{{ user.profile_picture.clone().unwrap() }}/thumbnail-small.avif"
             class="user-avatar" />
        {% else %}
        <div class="user-avatar-placeholder">
            <i class="fa-solid fa-user" style="font-size:14px;color:white;"></i>
        </div>
        {% endif %}
        <span class="text-white user-name-clamp">{{ user.name }}</span>
    </button>
    <div class="dropdown-content border shadow">
        <a class="dropdown-item" href="/u/{{ user.login }}" preload="mouseover"><i class="fa-solid fa-house-flag mx-2"></i>My Channel</a>
        <a class="dropdown-item" href="/studio" preload="mouseover"><i class="fa-solid fa-pen-ruler mx-2"></i>Studio</a>
        <a class="dropdown-item" href="/settings" preload="mouseover"><i class="fa-solid fa-gear mx-2"></i>Settings</a>
        <a class="dropdown-item" href="/hx/logout"><i class="fa-solid fa-arrow-right-from-bracket mx-2"></i>Log out</a>
    </div>
</div>
<script>
(function(){
    try {
        var theme = '{{ user_theme }}';
        var current = localStorage.getItem('user-theme');
        if (current !== theme) {
            localStorage.setItem('user-theme', theme);
            if (theme && theme !== 'default') {
                var existing = document.getElementById('user-theme-css');
                if (!existing) {
                    var link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.id = 'user-theme-css';
                    link.href = '/source/system_style/' + encodeURIComponent(theme) + '.css';
                    document.head.appendChild(link);
                } else {
                    existing.href = '/source/system_style/' + encodeURIComponent(theme) + '.css';
                }
            } else {
                var existing = document.getElementById('user-theme-css');
                if (existing) existing.remove();
            }
        }
    } catch(e){}
})();
</script>
