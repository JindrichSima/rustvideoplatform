<h5 class="text-white text-center mb-3">
    <i class="fa-solid fa-list me-1"></i>
    <a href="/list/{{ list_id }}" class="text-white text-decoration-none">{{ list_name }}</a>
</h5>
{% for item in items %}
<a
    href="/l/{{ list_id }}/{{ item.id }}"
    class="text-decoration-none {% if item.id == current_medium_id %}list-sidebar-active{% endif %}"
    preload="mouseover"
>
    <table class="my-3">
        <tr>
            <td class="d-flex justify-content-center me-3">
                <div
                    class="thumbnail-container"
                    style="position: relative; width: 176px; height: 99px"
                >
                    <img
                        src="/source/{{ item.id }}/thumbnail.avif"
                        class="mx-2 rounded {% if item.type == "video" %}thumbnail-static{% endif %}"
                        style="
                            position: absolute;
                            top: 0;
                            left: 0;
                            transition: opacity 0.3s;
                        "
                        width="176"
                        height="99"
                    />
                    {% if item.type == "video" %}
                    <img
                        src="/source/{{ item.id }}/showcase.avif"
                        class="mx-2 rounded thumbnail-animated"
                        style="
                            position: absolute;
                            top: 0;
                            left: 0;
                            opacity: 0;
                            transition: opacity 0.3s;
                        "
                        width="176"
                        height="99"
                    />
                    {% endif %}
                </div>
            </td>
            <td>
                <b class="text-white font-weight-bold">{{ item.name }}</b>
                <p class="text-secondary">
                    {{ item.owner }}<br />{{ item.views }} views
                    {% if item.type == "video" %}
                    <i class="fa-solid fa-video fa-sm ms-1"></i>
                    {% else if item.type == "audio" %}
                    <i class="fa-solid fa-music fa-sm ms-1"></i>
                    {% else if item.type == "picture" %}
                    <i class="fa-solid fa-image fa-sm ms-1"></i>
                    {% endif %}
                </p>
            </td>
        </tr>
    </table>
</a>
{% endfor %}

<style>
    .thumbnail-container:hover .thumbnail-static {
        opacity: 0 !important;
    }
    .thumbnail-container:hover .thumbnail-animated {
        opacity: 1 !important;
    }
</style>
