<div class="mt-2 p-3 border border-secondary rounded">
    <h6><i class="fa-solid fa-qrcode me-2"></i>Scan QR Code</h6>
    <p class="text-muted small">Open your authenticator app and scan the code below, or enter the secret manually.</p>

    <div class="text-center mb-3">
        <img src="data:image/png;base64,{{ qr_base64 }}" alt="TOTP QR Code" style="max-width:220px; border-radius:8px;">
    </div>

    <details class="mb-3">
        <summary class="text-muted small" style="cursor:pointer;">Show manual entry key</summary>
        <code class="d-block mt-1 p-2 bg-dark rounded" style="word-break:break-all;letter-spacing:2px;">{{ secret_base32 }}</code>
    </details>

    <hr>
    <h6>Verify Setup</h6>
    <p class="text-muted small">Enter the 6-digit code from your authenticator to confirm setup.</p>
    <form hx-post="/hx/settings/2fa/totp/verify-setup" hx-target="#2fa-totp-setup-area" hx-swap="innerHTML">
        <input type="hidden" name="setup_token" value="{{ setup_token }}">
        <div class="d-flex gap-2">
            <input class="form-control text-center" type="text" name="totp_code"
                   placeholder="000000" maxlength="6" pattern="[0-9]{6}"
                   inputmode="numeric" autocomplete="one-time-code" style="max-width:140px;">
            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-check me-1"></i>Confirm
            </button>
        </div>
    </form>
</div>
