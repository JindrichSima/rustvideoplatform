{% for comment in comments %}
<div class="comment-item my-3 p-3" style="border-left: 3px solid var(--bs-secondary); border-radius: 4px;">
    <div class="d-flex align-items-center mb-2">
        <a href="/channel/{{ comment.user }}" class="text-decoration-none">
            <h6 class="mb-0 text-white">{{ comment.user }}</h6>
        </a>
    </div>
    <div class="comment-content ql-editor p-0" style="min-height: auto;" data-comment-delta='{{ comment.text }}'></div>
</div>
{% endfor %}
<script>initCommentDeltas(document.getElementById("comments-list"));</script>
{% match next_page %}
{% when Some with (page) %}
<div
    hx-get="/hx/comments/{{ medium_id }}?page={{ page }}"
    hx-trigger="revealed"
    hx-swap="outerHTML"
    class="hx-placeholder"
></div>
{% when None %}
{% endmatch %}
