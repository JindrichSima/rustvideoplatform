{% for comment in comments %}
<div class="comment-item my-3 p-3 inf-scroll-reveal" style="border-left: 3px solid var(--bs-secondary); border-radius: 4px;">
    <div class="d-flex align-items-center mb-2 gap-2">
        <a href="/u/{{ comment.user }}" class="text-decoration-none d-flex align-items-center gap-2">
            {% if comment.user_picture.is_some() %}
            <img src="{{ config.source_server_url }}/source/{{ comment.user_picture.clone().unwrap() }}/thumbnail-small.avif"
                 class="user-avatar" />
            {% else %}
            <div class="user-avatar-placeholder">
                <i class="fa-solid fa-user" style="font-size:13px;color:white;"></i>
            </div>
            {% endif %}
            <h6 class="mb-0 text-white user-name-clamp">{{ comment.user_name }}</h6>
        </a>
    </div>
    <div class="comment-content ql-editor p-0" style="min-height: auto;" data-comment-delta='{{ comment.text }}'></div>
</div>
{% endfor %}
<script>initCommentDeltas(document.getElementById("comments-list"));</script>
{% match next_page %}
{% when Some with (page) %}
<div
    hx-get="/hx/comments/{{ medium_id }}?page={{ page }}"
    hx-trigger="revealed"
    hx-swap="outerHTML"
    class="hx-placeholder"
></div>
{% when None %}
{% endmatch %}
