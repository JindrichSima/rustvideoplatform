<!DOCTYPE html>
<html>

<head>
    {% include "component-dependencies.html" %}

    <title>{{ user.name }}</title>

    <meta property="og:title" content="{{ user.name }}" />
    <meta property="og:type" content="profile" />
    <meta property="og:profile:username" content="{{ user.login }}" />
    <meta property="og:profile:first_name" content="{{ user.name }}" />
    <meta property="og:url" content="https://{{ common_headers.host }}/u/{{ user.login }}" />
    <meta property="og:locale" content="{{ config.locale }}" />
    <meta property="og:description" content="{{ config.description }}" />
    <meta property="og:image" content="{{ config.source_server_url }}/source/favicon.svg" />
    <meta property="og:site_name" content="{{ config.instancename }}" />
</head>

<body hx-ext="preload">
    {{ sidebar }}
    {% include "component-navbar.html" %}
    <div class="row maincontentrow g-3 py-2 ps-2 w-100">
        <div class="col-12 col-sm-12 col-md-12 col-lg-12">
            <div class="card pt-3 px-3 text-white" style="min-height:30vh;">
                <table>
                    <tr>
                        <td class="text-center">
                            <div class="channel-picture-container d-inline-block">
                                {% if let Some(pic) = user.channel_picture %}
                                <img src="{{ config.source_server_url }}/source/{{ pic }}/picture.avif">
                                {% endif %}
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-center my-3">
                            <b class="text-white font-weight-bold">{{ user.name }}</b>
                            <p class="text-secondary">{{ user.login }}<br>{{ user.subscribed.unwrap_or(0) }} subscribtions</p>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        <div class="col-12 col-sm-12 col-md-12 col-lg-12">
            <div class="card py-3 px-3 text-white">
                <ul class="nav nav-tabs mb-3">
                    <li class="nav-item">
                        <button class="nav-link active text-white" hx-get="/hx/usermedia/{{ user.login }}" hx-target="#tab-content" hx-swap="innerHTML" preload="mouseover" hx-on:click="document.querySelectorAll('.nav-tabs .nav-link').forEach(t=>t.classList.remove('active'));this.classList.add('active')"><i class="fa-solid fa-photo-film me-2"></i>Media</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link text-white" hx-get="/hx/userlists/{{ user.login }}" hx-target="#tab-content" hx-swap="innerHTML" preload="mouseover" hx-on:click="document.querySelectorAll('.nav-tabs .nav-link').forEach(t=>t.classList.remove('active'));this.classList.add('active')"><i class="fa-solid fa-list me-2"></i>Lists</button>
                    </li>
                </ul>
                <div id="tab-content" class="row">
                    <div hx-get="/hx/usermedia/{{ user.login }}" hx-trigger="load" class="mb-3 hx-placeholder row" preload="always">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
