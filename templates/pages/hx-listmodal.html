<div class="list-modal-overlay" id="listModalOverlay" onclick="closeListModal(event)">
    <div class="list-modal-content" onclick="event.stopPropagation()">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-white m-0"><i class="fa-solid fa-list me-2"></i>Save to list</h4>
            <a class="btn text-white" style="cursor:pointer" onclick="document.getElementById('listModalOverlay').style.display='none'">
                <i class="fa-solid fa-xmark fa-lg"></i>
            </a>
        </div>
        <hr>
        {% for list in lists %}
        <div class="d-flex justify-content-between align-items-center my-2 px-2">
            <span class="text-white">{{ list.name }}</span>
            <div>
                {% if list.already_added %}
                <a hx-get="/hx/removefromlist/{{ list.id }}/{{ medium_id }}"
                   hx-target="#listmodal-body"
                   class="btn btn-secondary btn-sm">
                    <i class="fa-solid fa-check"></i> Added
                </a>
                {% else %}
                <a hx-get="/hx/addtolist/{{ list.id }}/{{ medium_id }}"
                   hx-target="#listmodal-body"
                   class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-plus"></i> Add
                </a>
                {% endif %}
            </div>
        </div>
        {% endfor %}
        {% if lists.is_empty() %}
        <p class="text-secondary text-center">You have no lists yet. Create one below.</p>
        {% endif %}
        <hr>
        <form hx-post="/hx/createlist/{{ medium_id }}" hx-target="#listmodal-body">
            <div class="input-group mb-2">
                <input type="text" name="name" class="form-control" placeholder="New list name..." required>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Create
                </button>
            </div>
            <div class="d-flex align-items-center gap-2 mx-2">
                <select name="visibility" class="form-select form-select-sm" style="width:auto;" id="listmodal-visibility">
                    <option value="hidden">Private</option>
                    <option value="public">Public</option>
                    <option value="restricted">Restricted to Group</option>
                </select>
                <select name="restricted_group" class="form-select form-select-sm" style="width:auto;" id="listmodal-group-select">
                    <option value="">-- Group --</option>
                    {% for group in owner_groups %}
                    <option value="{{ group.id }}">{{ group.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </form>
    </div>
</div>
<script>
(function() {
    var visEl = document.getElementById('listmodal-visibility');
    var groupEl = document.getElementById('listmodal-group-select');
    if (!visEl || !groupEl || typeof TomSelect === 'undefined') return;
    if (visEl.tomselect) visEl.tomselect.destroy();
    if (groupEl.tomselect) groupEl.tomselect.destroy();
    var visTomSelect = new TomSelect(visEl, { create: false });
    var groupTomSelect = new TomSelect(groupEl, { create: false, allowEmptyOption: true });
    groupTomSelect.wrapper.style.width = 'auto';
    function updateGroupVisibility() {
        groupTomSelect.wrapper.style.display = visTomSelect.getValue() === 'restricted' ? '' : 'none';
    }
    updateGroupVisibility();
    visEl.addEventListener('change', updateGroupVisibility);
})();
</script>
