<!doctype html>
<html lang="{{ config.locale }}">
    <head>
        {% include "component-dependencies.html" %}

        <title>Upload - {{ config.instancename }}</title>

        <meta name="description" content="{{ config.description }}" />
        <meta property="og:title" content="{{ config.instancename }} Upload" />
        <meta property="og:type" content="website" />
        <meta
            property="og:url"
            content="{{ config.site_url }}/upload"
        />
        <meta property="og:locale" content="{{ config.locale }}" />
        <meta property="og:description" content="{{ config.description }}" />
        <meta property="og:image" content="{{ config.source_server_url }}/source/favicon.svg" />
        <meta property="og:site_name" content="{{ config.instancename }}" />
    </head>

    <body hx-ext="preload">
        {{ sidebar }} {% include "component-navbar.html" %}
        <div class="row maincontentrow g-3 py-2 ps-2 w-100" role="main">
            <div class="col-12 col-sm-12 col-md-12 col-lg-12">
                <div class="card py-3 px-3 text-white" style="min-height: 80vh">
                    <h3 class="my-2 mx-3">Upload</h3>
                    <hr />
                    <h1 class="m-3 text-center">
                        What do you want to upload today?
                    </h1>
                    <div class="d-flex justify-content-center">
                        <div class="w-100" style="max-width: 600px">
                            <div id="upload-container">
                                <div class="d-flex flex-column align-items-center">
                                    <input
                                        class="btn btn-primary m-3"
                                        type="file"
                                        name="file"
                                        id="upload-file-input"
                                        style="width: 100%; max-width: 500px;"
                                    />
                                    <br />
                                    <button
                                        class="btn btn-primary text-center m-3"
                                        id="upload-submitbutton"
                                        style="width: 150px"
                                        onclick="startUpload()"
                                    >
                                        <i class="fa-solid fa-upload"></i>&nbsp;Upload
                                    </button>

                                    <div id="upload-progress-area" style="display: none; width: 100%; max-width: 500px;">
                                        <div class="mb-2" style="position: relative; height: 28px; background: var(--bs-secondary); border-radius: var(--bs-border-radius); overflow: hidden;">
                                            <div id="upload-progress-bar" style="
                                                height: 100%;
                                                width: 0%;
                                                background: linear-gradient(90deg, var(--bs-success), #20c997);
                                                border-radius: var(--bs-border-radius);
                                                transition: width 0.3s ease;
                                            "></div>
                                            <span id="upload-progress-text" style="
                                                position: absolute;
                                                top: 50%;
                                                left: 50%;
                                                transform: translate(-50%, -50%);
                                                font-weight: 700;
                                                font-size: 0.85rem;
                                                text-shadow: 0 1px 2px rgba(0,0,0,0.5);
                                                color: #fff;
                                            ">0%</span>
                                        </div>
                                        <div class="d-flex justify-content-between" style="font-size: 0.8rem; opacity: 0.85;">
                                            <span id="upload-stats-transferred">0 MB / 0 MB</span>
                                            <span id="upload-stats-speed">-- MB/s</span>
                                            <span id="upload-stats-eta">ETA: --</span>
                                        </div>
                                    </div>
                                </div>

                                <div id="upload-result" class="mt-3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
        function formatBytes(bytes) {
            if (bytes >= 1e9) return (bytes / 1e9).toFixed(2) + ' GB';
            if (bytes >= 1e6) return (bytes / 1e6).toFixed(2) + ' MB';
            if (bytes >= 1e3) return (bytes / 1e3).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function formatETA(seconds) {
            if (!isFinite(seconds) || seconds < 0) return '--';
            if (seconds < 60) return Math.ceil(seconds) + 's';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + Math.ceil(seconds % 60) + 's';
            var h = Math.floor(seconds / 3600);
            var m = Math.ceil((seconds % 3600) / 60);
            return h + 'h ' + m + 'm';
        }

        function startUpload() {
            var fileInput = document.getElementById('upload-file-input');
            if (!fileInput.files || !fileInput.files[0]) {
                return;
            }

            var file = fileInput.files[0];
            var formData = new FormData();
            formData.append('file', file);

            window.isUploading = true;
            document.getElementById('upload-submitbutton').disabled = true;
            document.getElementById('upload-submitbutton').style.display = 'none';
            document.getElementById('upload-file-input').disabled = true;
            document.getElementById('upload-progress-area').style.display = 'block';

            var progressBar = document.getElementById('upload-progress-bar');
            var progressText = document.getElementById('upload-progress-text');
            var statsTransferred = document.getElementById('upload-stats-transferred');
            var statsSpeed = document.getElementById('upload-stats-speed');
            var statsETA = document.getElementById('upload-stats-eta');

            var totalSize = file.size;
            var startTime = Date.now();
            var lastLoaded = 0;
            var lastTime = startTime;
            var smoothSpeed = 0;

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/hx/upload', true);

            xhr.upload.addEventListener('progress', function(evt) {
                if (evt.lengthComputable) {
                    var pct = (evt.loaded / evt.total) * 100;
                    progressBar.style.width = pct + '%';
                    progressText.textContent = Math.floor(pct) + '%';

                    var now = Date.now();
                    var elapsed = (now - lastTime) / 1000;
                    if (elapsed > 0.3) {
                        var bytesPerSec = (evt.loaded - lastLoaded) / elapsed;
                        smoothSpeed = smoothSpeed > 0 ? smoothSpeed * 0.7 + bytesPerSec * 0.3 : bytesPerSec;
                        lastLoaded = evt.loaded;
                        lastTime = now;

                        statsSpeed.textContent = formatBytes(smoothSpeed) + '/s';
                        var remaining = evt.total - evt.loaded;
                        statsETA.textContent = 'ETA: ' + formatETA(remaining / smoothSpeed);
                    }

                    statsTransferred.textContent = formatBytes(evt.loaded) + ' / ' + formatBytes(evt.total);
                }
            });

            xhr.addEventListener('load', function() {
                window.isUploading = false;
                progressBar.style.width = '100%';
                progressText.textContent = '100%';
                statsSpeed.textContent = '';
                var totalTime = (Date.now() - startTime) / 1000;
                statsETA.textContent = 'Done in ' + formatETA(totalTime);

                document.getElementById('upload-result').innerHTML = xhr.responseText;
            });

            xhr.addEventListener('error', function() {
                window.isUploading = false;
                progressBar.style.background = 'var(--bs-danger)';
                progressText.textContent = 'Error';
                statsSpeed.textContent = '';
                statsETA.textContent = '';
                document.getElementById('upload-result').innerHTML =
                    '<div class="alert alert-danger text-center">Upload failed. Please check your connection and try again.</div>';
                document.getElementById('upload-submitbutton').disabled = false;
                document.getElementById('upload-submitbutton').style.display = '';
                document.getElementById('upload-file-input').disabled = false;
            });

            xhr.addEventListener('abort', function() {
                window.isUploading = false;
                progressText.textContent = 'Cancelled';
                document.getElementById('upload-submitbutton').disabled = false;
                document.getElementById('upload-submitbutton').style.display = '';
                document.getElementById('upload-file-input').disabled = false;
            });

            xhr.send(formData);
        }
        </script>
    </body>
</html>
