<!doctype html>
<html>
    <head>
        {% include "component-dependencies.html" %}

        <title>{{concept.name}}</title>

        <meta property="og:title" content="{{ config.instancename }} Concept" />
        <meta property="og:type" content="website" />
        <meta
            property="og:url"
            content="https://{{ common_headers.host }}/concepts"
        />
    </head>

    <body hx-ext="preload">
        {{ sidebar }} {% include "component-navbar.html" %}
        <div class="row maincontentrow g-3 py-2 ps-2 w-100">
            <div class="col-12 col-sm-12 col-md-12 col-lg-12">
                <div class="card py-3 px-3 text-white" style="min-height: 80vh">
                    <h3 class="my-2 mx-3">Concept</h3>
                    <hr />
                    <form
                        action="/studio/concept/{{concept.id}}/publish"
                        method="post"
                        class="mx-3"
                        id="publish-form"
                    >
                        <div class="form-group row my-3">
                            <label for="medium_id" class="col-4 col-form-label"
                                >URL</label
                            >
                            <div class="col-8">
                                <div class="input-group">
                                    <input
                                        id="medium_id"
                                        name="medium_id"
                                        type="text"
                                        required
                                        class="form-control"
                                        value="{{concept.id}}"
                                    />
                                </div>
                            </div>
                        </div>
                        <div class="form-group row my-3">
                            <label
                                for="medium_name"
                                class="col-4 col-form-label"
                                >Name</label
                            >
                            <div class="col-8">
                                <input
                                    id="medium_name"
                                    name="medium_name"
                                    type="text"
                                    class="form-control"
                                    required
                                    value="{{concept.name}}"
                                />
                            </div>
                        </div>
                        <div class="form-group row my-3">
                            <label
                                for="medium_description"
                                class="col-4 col-form-label"
                                >Description</label
                            >
                            <div class="col-8">
                                <div
                                    id="medium_description_editor"
                                    style="height: 50vh"
                                ></div>
                                <input
                                    type="hidden"
                                    name="medium_description"
                                    id="medium_description"
                                />
                            </div>
                        </div>
                        <div class="form-group row my-3">
                            <label
                                for="medium_visibility"
                                class="col-4 col-form-label"
                                >Visibility</label
                            >
                            <div class="col-8">
                                <select
                                    id="medium_visibility"
                                    name="medium_visibility"
                                    class="form-select"
                                    required
                                >
                                    <option value="public" selected>
                                        Public
                                    </option>
                                    <option value="hidden">Hidden</option>
                                    <option value="restricted">Restricted to Group</option>
                                </select>
                                <select
                                    id="medium_restricted_group"
                                    name="medium_restricted_group"
                                    class="form-select mt-2"
                                    style="display:none"
                                >
                                    <option value="">-- Select a group --</option>
                                    {% for group in owner_groups %}
                                    <option value="{{ group.id }}">{{ group.name }}</option>
                                    {% endfor %}
                                </select>
                                {% if owner_groups.is_empty() %}
                                <small class="text-secondary mt-1" id="no-groups-hint" style="display:none">
                                    You have no groups yet. <a href="/studio/groups" class="text-primary">Create one</a> to use restricted visibility.
                                </small>
                                {% endif %}
                            </div>
                        </div>
                        <div class="form-group row my-3">
                            <div class="offset-4 col-8">
                                <button
                                    name="submit"
                                    type="submit"
                                    class="btn btn-primary"
                                >
                                    Publish
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
