<div class="d-flex justify-content-end mx-1">
    <form id="navSearchForm" onsubmit="return navbarSearch(event)">
        <div class="input-group m-2 text-white">
            <input id="searchInput" class="form-control searchinput" hx-post="/hx/searchsuggestions"
                hx-trigger="keyup changed delay:250ms" hx-target="#suggestions" name="search"
                autocomplete="off" placeholder="Search...">
            <div class="input-group-append">
                <button class="searchbtn btn-primary" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
        <ul id="suggestions" class="list-group text-white p-2 m-1" style="display: none;">
          <a href="/search" class="suggestionitem border px-3 suggestion-viewall" preload="mouseover">
            <li>
                <i class="fa-solid fa-magnifying-glass me-2"></i><b>Use advanced search</b>
            </li>
          </a>
        </ul>
    </form>
    <div class="m-2 mx-4 text-white" hx-get="/hx/usernav" hx-trigger="load" style="width:120px;height:40px;" preload="always">
        <a href="/login" preload="mouseover"><button class="btn text-white"><i class="fa-solid fa-user mx-2"></i>Log in</button></a>
    </div>
    <div class="m-2 text-white">
        <button class="btn btn-primary" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    </div>
</div>
