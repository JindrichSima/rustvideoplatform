<nav class="navbar-container mx-1" role="navigation" aria-label="Main navigation">
    <div class="navbar-top-row align-items-center">
        <a href="/" class="navbar-instance-name text-white text-decoration-none ms-3 me-auto fs-3 fw-semibold">
            {{ config.instancename }}
        </a>
        {% if page_title is defined %}
        <span class="navbar-page-title ms-3 me-auto fs-3 fw-semibold text-white">{{ page_title }}</span>
        {% else %}
        <span class="me-auto navbar-page-title"></span>
        {% endif %}
        <form id="navSearchForm" class="navbar-search-form" onsubmit="return navbarSearch(event)" role="search" aria-label="Site search">
            <div class="input-group m-2 text-white">
                <input id="searchInput" class="form-control searchinput" hx-post="/hx/searchsuggestions"
                    hx-trigger="keyup changed delay:250ms" hx-target="#suggestions" name="search"
                    autocomplete="off" placeholder="Search..." aria-label="Search">
                <div class="input-group-append">
                    <button class="searchbtn btn-primary h-100" type="submit" aria-label="Submit search">
                        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <ul id="suggestions" class="list-group text-white p-2 m- border" style="display: none;" role="listbox" aria-label="Search suggestions">
              <a href="/search" class="suggestionitem p-2" preload="mouseover">
                <li role="option">
                    <i class="fa-solid fa-magnifying-glass me-2" aria-hidden="true"></i><b>Use advanced search</b>
                </li>
              </a>
            </ul>
        </form>
        <div class="my-1 text-white d-flex align-items-center gap-5">
            <div hx-get="/hx/usernav" hx-trigger="load" style="width:120px;height:40px;" class="mx-3" preload="always">
                <a href="/login" preload="mouseover" style="visibility:hidden;"><button class="btn text-white"><i class="fa-solid fa-user mx-2" aria-hidden="true"></i>Log in</button></a>
            </div>
            <button class="btn btn-primary ms-3" onclick="toggleSidebar()" aria-label="Toggle sidebar" aria-expanded="true" aria-controls="sidebar"><i class="fa-solid fa-bars fa-xl" aria-hidden="true"></i></button>
        </div>
    </div>
    {% if page_title is defined %}
    <div class="navbar-mobile-title text-white ms-3 fs-3 fw-semibold">{{ page_title }}</div>
    {% endif %}
</nav>
